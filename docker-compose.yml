services:

  zookeeper:
    platform: linux/amd64
    image: wurstmeister/zookeeper
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"   # Client Zookeeper
    volumes:
        - zookeeper_data:/opt/zookeeper-3.4.13/data
  kafka:
    platform: linux/amd64
    image: wurstmeister/kafka
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"   # clients externes
      - "9093:9093"   # réseau Docker interne
    environment:
      SERVER_IP: 192.168.88.4

      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://192.168.88.4:9092,INTERNAL://kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Pas de création implicite sauvage
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Topics alignés sur tes domaines métier
      KAFKA_CREATE_TOPICS: >-
        salle.station.events:1:1,
        salle.recording.events:3:1,
        salle.upload.events:3:1,
        salle.device.events:2:1,
        salle.tracker.events:2:1,
        salle.inventory.events:1:1

      # Single-node: indispensables pour éviter des configs par défaut inutiles
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # Mémoire JVM
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"

      # Rétention saine pour debug / replay court
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 268435456
      KAFKA_LOG_DIRS: /kafka/logs

      # Réduction de la latence sans fsync par message
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000

      # Taille max de message raisonnable si certains events grossissent
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760

  volumes:
    - kafka_data:/kafka/logs
  depends_on:
    - zookeeper
volumes:
  zookeeper_data:
  kafka_data:

networks:
  default:
    name: kafka-network
